name: Build & Deploy

on:
    release:
        types:
            - published

permissions:
    contents: read
    packages: write

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and Push Docker Image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  push: true
                  tags: |
                      ghcr.io/satyamahendra/svtyv:latest
                      ghcr.io/satyamahendra/svtyv:${{ github.sha }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

    deploy:
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: Deploy Containers to VPS via SSH
              uses: appleboy/ssh-action@v1.2.2
              with:
                  host: ${{ secrets.SSH_HOST }}
                  username: ${{ secrets.SSH_USERNAME }}
                  key: ${{ secrets.SSH_KEY }}
                  envs: GITHUB_TOKEN,GITHUB_ACTOR,RAW_ENV
                  script: |
                      # 1. Temporarily log into GHCR via memory
                      echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

                      # 2. Ensure isolated Docker network exists
                      docker network create svtyv-net || true

                      # 3. Pull the updated app image
                      docker pull ghcr.io/satyamahendra/svtyv:latest

                      # 4. Stop and remove old instances safely
                      docker stop svtyv-app svtyv-db || true
                      docker rm svtyv-app svtyv-db || true

                      # Extract DATABASE_URL line from raw env block
                      DB_URL_STR=$(echo "$RAW_ENV" | grep "^DATABASE_URL=")

                      # Parse out user, password, and db name from the connection string natively
                      EXTRACTED_USER=$(echo "$DB_URL_STR" | sed -E 's|DATABASE_URL=.*://([^:]+):.*|\1|')
                      EXTRACTED_PASS=$(echo "$DB_URL_STR" | sed -E 's|DATABASE_URL=.*://[^:]+:([^@]+)@.*|\1|')
                      EXTRACTED_NAME=$(echo "$DB_URL_STR" | sed -E 's|DATABASE_URL=.*://[^@]+@[^/]+/([^?]+).*|\1|')

                      # 5. Spin up Postgres with the parsed credentials injected explicitly
                      docker run -d \
                      --name svtyv-db \
                      --network svtyv-net \
                      --restart unless-stopped \
                      -p 5433:5432 \
                      -v postgres_data:/var/lib/postgresql/data \
                      -e POSTGRES_USER="$EXTRACTED_USER" \
                      -e POSTGRES_PASSWORD="$EXTRACTED_PASS" \
                      -e POSTGRES_DB="$EXTRACTED_NAME" \
                      postgres:17-alpine

                      # Give Postgres a full 10 seconds to create storage tables and listen
                      sleep 10

                      # 6. Spin up App using the clean memory stream format
                      docker run -d \
                      --name svtyv-app \
                      --network svtyv-net \
                      --restart unless-stopped \
                      -p 3001:3000 \
                      --env-file <(echo "$RAW_ENV") \
                      ghcr.io/satyamahendra/svtyv:latest \
                      sh -c "npx prisma migrate deploy && node server.js"

                      # 7. Clean up old dangling images
                      docker image prune -f
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  GITHUB_ACTOR: ${{ github.actor }}
                  RAW_ENV: ${{ secrets.ENV }}
